<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agrovet Manager – Business Management System</title>
  <meta name="description" content="Agrovet Business Management System – Inventory, Sales, Expenses & Reports" />

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌱</text></svg>" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <!-- React + ReactDOM (production CDN) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel Standalone (transpiles JSX in-browser) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      font-family: 'Lato', 'Segoe UI', sans-serif;
      background: #f0f4f0;
      -webkit-font-smoothing: antialiased;
    }
    #root { min-height: 100vh; }

    /* Print styles */
    @media print {
      aside, nav, .no-print { display: none !important; }
      main { margin-left: 0 !important; }
      body { background: #fff; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #c8e6c9; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #4caf50; }

    /* Loading screen */
    #loading {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #e8f5e9 0%, #f1f8e9 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'Lato', sans-serif; z-index: 9999;
    }
    #loading .emoji { font-size: 48px; margin-bottom: 16px; animation: pulse 1.5s ease-in-out infinite; }
    #loading h1 { font-size: 22px; font-weight: 800; color: #1a3a2a; margin: 0 0 8px; }
    #loading p { font-size: 13px; color: #666; margin: 0; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
  </style>
</head>
<body>

  <!-- Loading screen (hidden once React mounts) -->
  <div id="loading">
    <div class="emoji">🌱</div>
    <h1>Agrovet Manager</h1>
    <p>Loading your business dashboard...</p>
  </div>

  <div id="root"></div>

  <script type="text/babel" data-presets="react" src="app.js"></script>

  <script>
    // Hide loading screen once React has rendered
    window.addEventListener('DOMContentLoaded', function() {
      setTimeout(function() {
        var loading = document.getElementById('loading');
        if (loading) loading.style.display = 'none';
      }, 800);
    });
  </script>
</body>
</html>
